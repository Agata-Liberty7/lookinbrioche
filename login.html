async function initLogin() {

document.getElementById('inp-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

window.doLogin = async () => {
  const login=document.getElementById('inp-login').value.trim();
  const pass=document.getElementById('inp-pass').value;
  const err=document.getElementById('err-msg');
  try {
    showLoading('');
    const client = await fbFindClient(login, pass);
    hideLoading();
    if (client) {
      setCurrentUser(client);
      try {
        await fbRecordClientLogin(client.id);
      } catch (statsError) {
        console.warn('Could not record client login:', statsError);
      }
      window.location.href='shop.html';
    }
    else { err.textContent=t('loginError'); err.style.display='block'; }
  } catch(e) { hideLoading(); err.textContent=t('loginError'); err.style.display='block'; }
};

if (getCurrentUser()) window.location.href='shop.html';
initLogin();
</script>
