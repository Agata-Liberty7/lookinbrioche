<script type="module">
import { fbGetSettings, fbGetCatalog, fbFindClient, fbAddOrder, fbGetOrders, fbSaveClient, fbUpdateOrder, fbRecordClientVisit } from './firebase.js';

const currentUser = getCurrentUser();
if (!currentUser) {
  window.location.href='login.html';
} else {
  const visitKey = `clientVisitRecorded:${currentUser.id}`;
  if (!sessionStorage.getItem(visitKey)) {
    sessionStorage.setItem(visitKey, '1');
    fbRecordClientVisit(currentUser.id).catch(error => {
      sessionStorage.removeItem(visitKey);
      console.warn('Could not record client visit:', error);
    });
  }
}

const EMOJIS = {
  pan:'🍞',
  pirozhki:'🥟',
  rogaliki:'🥐',
  buns:'🍞',
  seasonal:'✨',
  frozen:'❄️',
  other:'🍴',
  Pan:'🍞',
  Piroski:'🥟',
  Pirogi:'🥮',
  Vypechka:'🍞',
  Sladosti:'🍯',
  Tartas:'🎂',
  Other:'🍴'
};

const CATEGORY_LABELS = {
  pan:      { es:'Pan brioche',       ru:'Бриошный хлеб',       en:'Brioche bread' },
  pirozhki: { es:'Empanadillas',      ru:'Пирожки',             en:'Pirozhki' },
  rogaliki: { es:'Brioche relleno',   ru:'Рогалики',            en:'Filled brioche' },
  buns:     { es:'Bollería',          ru:'Булочки',             en:'Bakery' },
  seasonal: { es:'Temporada',         ru:'Сезонные позиции',    en:'Seasonal' },
  frozen:   { es:'Congelados',        ru:'Заморозка',           en:'Frozen' },
  other:    { es:'Other',             ru:'Другое',              en:'Other' }
};

function clientLang() {
  const raw = detectLang?.() || 'es';
  const lang = String(raw).slice(0,2).toLowerCase();
  return ['es','ru','en'].includes(lang) ? lang : 'es';
}

function pickLocalized(obj, base) {
  if (!obj) return '';
  const lang = clientLang();
  return (
    obj[`${base}_${lang}`] ||
    obj[`${base}${lang.toUpperCase()}`] ||
    obj[base] ||
    obj[`${base}_es`] ||
    obj[`${base}_ru`] ||
    obj[`${base}_en`] ||
    ''
  );
}

function productName(p) {
  return pickLocalized(p, 'name') || 'Producto';
}

function productDesc(p) {
  return pickLocalized(p, 'description') || p.desc || '';
}

function normalizeCatKey(category) {
  const c = String(category || 'other').trim().toLowerCase();

  const map = {
    pan: 'pan',
    bread: 'pan',
    'беленый хлеб': 'pan',

    piroski: 'pirozhki',
    piroshki: 'pirozhki',
    pirozhki: 'pirozhki',
    pirogi: 'pirozhki',
    empanadillas: 'pirozhki',
    'пирожки': 'pirozhki',

    rogaliki: 'rogaliki',
    croissants: 'rogaliki',
    'рогалики': 'rogaliki',
    'brioche relleno': 'rogaliki',

    buns: 'buns',
    bolleria: 'buns',
    'bollería': 'buns',
    'булочки': 'buns',

    seasonal: 'seasonal',
    temporada: 'seasonal',
    'сезонные позиции': 'seasonal',

    frozen: 'frozen',
    congelados: 'frozen',
    'заморозка': 'frozen',

    other: 'other',
    другое: 'other'
  };

  return map[c] || c || 'other';
}

function categoryLabel(category) {
  const key = normalizeCatKey(category);
  const lang = clientLang();
  return CATEGORY_LABELS[key]?.[lang] || category || CATEGORY_LABELS.other[lang];
}

function categoryEmoji(category) {
  const key = normalizeCatKey(category);
  return EMOJIS[key] || EMOJIS[category] || '🍴';
}
let currentCat = null;
let selectedPay = 'cash';
let selectedDeliveryMethod = 'delivery';
let sheetProductId = null;
let _catalog = [];
let _orders = [];

// ─── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  showLoading('Loading…');
  applyTheme(); applyFont();

  try {
    // Load settings
    const s = await fbGetSettings();
    if (s) { window._settings = Object.assign({}, window._settings||{}, s); saveSettingsCache(window._settings); }
    applyTheme(); applyFont();

    // Load catalog
    _catalog = await fbGetCatalog();
    if (!_catalog.length) {
      // Seed default catalog on first run
      _catalog = [
        { id:'1', name:'Barra brioche', price:4.5, unit:'sht', category:'Pan', available:true, minQty:1, photo:null, description:'Pan brioche artesano', ingredients:'Masa madre, harina de trigo fuerza, leche, mantequilla, azúcar, sal, yema de huevo. ¡Sin levadura!' },
        { id:'2', name:'Piroski de carne', price:2.5, unit:'sht', category:'Piroski', available:true, minQty:5, photo:null, description:'', ingredients:'' },
        { id:'3', name:'Piroski de col', price:2.0, unit:'sht', category:'Piroski', available:true, minQty:5, photo:null, description:'', ingredients:'' },
      ];
    }
    window._catalog = _catalog;
    currentCat = 'all';

    // Load my orders
    _orders = await fbGetOrders();

    hideLoading();
    initStrings();
    renderCatalog();
  } catch(e) {
    console.error(e);
    hideLoading();
    showToast('Connection error — offline mode');
    currentCat = 'all';
    initStrings();
    renderCatalog();
  }
}

function userHasCustomPrices(user) {
  const prices = user?.customPrices || {};
  return Object.values(prices).some(v => {
    const n = Number(v);
    return Number.isFinite(n) && n > 0;
  });
}

function accountSpecialPricesLabel() {
  const lang = detectLang();
  return ({ es:'Precios especiales', ru:'Спеццены', en:'Special prices' }[lang]) || 'Special prices';
}

function refreshShopLanguage() {
  initStrings();
  renderCatalog();
  syncCartViews();
  if (document.getElementById('page-cart')?.classList.contains('active')) renderCart();
  if (document.getElementById('page-orders')?.classList.contains('active')) renderMyOrders();
  if (sheetProductId) updateSheetQty();
}

window.shopSetLang = function(lang) {
  localStorage.setItem('lang', lang);
  document.documentElement.lang = lang;
  const menu = document.getElementById('lang-menu');
  if (menu) menu.style.display = 'none';
  refreshShopLanguage();
};

window.setLang = window.shopSetLang;


function initStrings() {
  const s = getSettings();
  document.getElementById('hdr-name').textContent = s.shopName || t('appName');
  document.getElementById('hdr-tag').textContent  = s.shopTagline || t('appTagline');
  document.title = s.shopName || t('appName');
  if (s.logo) {
    const logoEl = document.getElementById('hdr-logo');
    const existingImg = document.querySelector('.logo-img');
    if (existingImg) {
      existingImg.src = s.logo;
    } else if (logoEl) {
      const img = document.createElement('img');
      img.src = s.logo;
      img.className = 'logo-img';
      logoEl.replaceWith(img);
    }
  }
  ['btn-back-cart','btn-back-co'].forEach(id=>document.getElementById(id).textContent=t('back'));
  document.getElementById('hdr-cart').textContent      = t('cart');
  document.getElementById('hdr-checkout').textContent  = t('orderTitle');
  document.getElementById('lbl-yourdata').textContent  = t('yourData');
  document.getElementById('lbl-name').textContent      = t('name')+' *';
  document.getElementById('lbl-phone').textContent     = t('phone')+' *';
  document.getElementById('lbl-addr').textContent      = t('address');
  document.getElementById('ch-addr').placeholder       = t('addressPlaceholder');
  document.getElementById('lbl-delivery').textContent  = t('deliveryDate');
  document.getElementById('lbl-date').textContent      = t('date')+' *';
  document.getElementById('lbl-time').textContent      = t('time');
  document.getElementById('opt-any').textContent       = t('timeAny');
  document.getElementById('lbl-payment-hdr').textContent = t('paymentMethod');
  document.getElementById('lbl-topay').textContent     = t('toPay');
  document.getElementById('btn-confirm').textContent   = t('confirmOrder');
  document.getElementById('lbl-items').textContent     = t('items');
  document.getElementById('lbl-total').textContent     = t('total');
  document.getElementById('cart-empty-txt').textContent= t('cartEmpty');
  document.getElementById('success-title').textContent = t('orderSuccess');
  document.getElementById('hdr-myorders').textContent  = t('myOrders');
  document.getElementById('btn-neworder').textContent  = t('newOrder');
  document.getElementById('nav-catalog-lbl').textContent = t('catalog');
  document.getElementById('nav-cart-lbl').textContent    = t('cart');
  document.getElementById('nav-orders-lbl').textContent  = t('orders');
  document.getElementById('ch-name').placeholder  = t('namePlaceholder');
  document.getElementById('ch-phone').placeholder = t('phonePlaceholder');

  const lang = detectLang();
  const contactI18n = {
    es:{person:'Persona de contacto', phone:'Teléfono de contacto', personPh:'Nombre de contacto', phonePh:'+34 600 000 000'},
    ru:{person:'Контактное лицо', phone:'Телефон контактного лица', personPh:'Имя контактного лица', phonePh:'+34 600 000 000'},
    en:{person:'Contact person', phone:'Contact phone', personPh:'Contact name', phonePh:'+34 600 000 000'}
  }[lang] || {person:'Contact person', phone:'Contact phone', personPh:'Contact name', phonePh:'+34 600 000 000'};

  document.getElementById('lbl-contact-person').textContent = contactI18n.person;
  document.getElementById('lbl-contact-phone').textContent = contactI18n.phone;
  document.getElementById('ch-contact-person').placeholder = contactI18n.personPh;
  document.getElementById('ch-contact-phone').placeholder = contactI18n.phonePh;

  const user = getCurrentUser();
  if (user && !user.guest) {
    const displayName = user.name || user.login || 'Cliente';
    document.getElementById('ch-name').value = displayName;
    document.getElementById('ch-phone').value = user.phone || user.contactPhone || '';
    document.getElementById('ch-contact-person').value = user.contactPerson || '';
    document.getElementById('ch-contact-phone').value = user.contactPhone || '';
    document.getElementById('ch-addr').value = user.address || '';
    selectedDeliveryMethod = user.deliveryMethod === 'pickup' ? 'pickup' : 'delivery';

    const invoiceEl = document.getElementById('ch-invoice-details');
    if (invoiceEl) invoiceEl.value = user.invoiceDetails || '';

    if (user.preferredPayment) {
      if (typeof window.selectPay === 'function') window.selectPay(user.preferredPayment);
      else selectedPay = user.preferredPayment;
      if (user.preferredPayment === 'invoice') {
        const invoiceWrap = document.getElementById('invoice-details-wrap');
        if (invoiceWrap) invoiceWrap.style.display = 'block';
      }
    }

    let txt = '👤 '+displayName;
    if (userHasCustomPrices(user)) txt += ' · '+accountSpecialPricesLabel();
    else if (user.discount>0) txt += ' · '+t('discount')+': −'+user.discount+'%';
    const b=document.getElementById('user-banner'); b.textContent=txt; b.style.display='block';
  }
  buildPaymentOpts();
  const tom=new Date(); tom.setDate(tom.getDate()+1);
  document.getElementById('ch-date').value=tom.toISOString().split('T')[0];
  document.getElementById('ch-date').min=new Date().toISOString().split('T')[0];
}

function renderCatalog() {
  const catalog = _catalog.filter(p=>p.available!==false);
  const cats = ['all', ...new Set(catalog.map(p=>normalizeCatKey(p.category)))];

  document.getElementById('cat-tabs').innerHTML = cats.map(c => {
    const label = c === 'all' ? t('all') : `${categoryEmoji(c)} ${categoryLabel(c)}`;
    return `<button class="cat-tab ${c===currentCat?'active':''}" onclick="selectCat('${c.replace(/'/g,"\\'")}')">${label}</button>`;
  }).join('');

  const items = currentCat==='all' ? catalog : catalog.filter(p=>normalizeCatKey(p.category)===currentCat);
  const cart = getCart();
  const el = document.getElementById('product-list');
  if (!items.length){el.innerHTML='<div class="empty-state"><div class="eicon">😔</div></div>';return;}

  el.innerHTML = items.map(p=>{

function shopUnitLabel() {
  const lang = detectLang();
  if (lang === 'ru') return 'шт';
  if (lang === 'en') return 'pcs';
  return 'uds';
}

function shopPackLabel() {
  const lang = detectLang();
  if (lang === 'ru') return 'упаковка';
  return 'pack';
}

function productPackQty(p) {
  return Math.max(1, Number(p?.packQty || p?.minQty || 1));
}

function productUnitPrice(p) {
  const packQty = productPackQty(p);
  const packPrice = Number(p?.packPrice || 0);
  if (packPrice > 0 && packQty > 0) return packPrice / packQty;
  return Number(p?.price || 0);
}

function clientCustomPackPrice(p) {
  const user = getCurrentUser();
  if (!user || user.guest || !p?.id) return null;

  const prices = user.customPrices || {};
  const n = Number(prices[String(p.id)]);

  return Number.isFinite(n) && n > 0 ? n : null;
}

function hasClientCustomPrice(p) {
  return clientCustomPackPrice(p) !== null;
}

function specialPriceLabel() {
  const lang = detectLang();
  return ({ es:'Precio especial', ru:'Спеццена', en:'Special price' }[lang]) || 'Special price';
}

function productDisplayUnitPrice(p) {
  const customPackPrice = clientCustomPackPrice(p);
  if (customPackPrice !== null) return customPackPrice / productPackQty(p);
  return clientPrice(productUnitPrice(p));
}

function productDisplayPackPrice(p) {
  const customPackPrice = clientCustomPackPrice(p);
  if (customPackPrice !== null) return customPackPrice;

  const packPrice = Number(p.packPrice || 0);
  if (Number.isFinite(packPrice) && packPrice > 0) return clientPrice(packPrice);
  return productDisplayUnitPrice(p) * productPackQty(p);
}

function productPriceLine(p) {
  const qty = productPackQty(p);
  const suffix = qty > 1 ? shopPackLabel() : shopUnitLabel();
  const value = qty > 1 ? productDisplayPackPrice(p) : productDisplayUnitPrice(p);
  return `${formatPrice(value)} <span style="font-size:12px;color:var(--text3);font-weight:400">/ ${suffix}</span>`;
}

function productPriceText(p) {
  const qty = productPackQty(p);
  const suffix = qty > 1 ? shopPackLabel() : shopUnitLabel();
  const value = qty > 1 ? productDisplayPackPrice(p) : productDisplayUnitPrice(p);
  return `${formatPrice(value)} / ${suffix}`;
}

function productPackMeta(p) {
  const qty = productPackQty(p);
  if (qty <= 1) return '';
  return `<div class="product-meta">Pack ${qty} ${shopUnitLabel()}</div>`;
}

function productMinQty(p) {
  return Math.max(1, Number(p?.minQty || 1));
}

function productStepQty(p) {
  return Math.max(1, Number(p?.stepQty || p?.minQty || 1));
}

function nextProductQty(p, currentQty, direction) {
  const minQ = productMinQty(p);
  const step = productStepQty(p);
  const current = Number(currentQty || 0);

  if (direction > 0) {
    if (current <= 0) return minQ;
    if (current < minQ) return minQ;

    const offset = current - minQ;
    if (offset % step !== 0) return minQ + Math.ceil(offset / step) * step;

    return current + step;
  }

  if (current <= minQ) return 0;

  const offset = current - minQ;
  if (offset % step !== 0) return minQ + Math.floor(offset / step) * step;

  return current - step;
}

window.addToCart = id => {
  const p=_catalog.find(x=>x.id===id);
  if(!p) return;

  let cart=getCart(); const ex=cart.find(c=>c.id===id);
  if(ex){ex.qty=nextProductQty(p, ex.qty, 1);}
  else{cart.push({id,qty:productMinQty(p)});}

  saveCart(cart); syncCartViews();
};

window.chQty = (id,delta) => {
  let cart=getCart(); const item=cart.find(c=>c.id===id);
  const p=_catalog.find(x=>x.id===id);
  if(item && p){
    const next = nextProductQty(p, item.qty, delta);
    if(next <= 0) cart=cart.filter(c=>c.id!==id);
    else item.qty = next;
  }
  saveCart(cart); syncCartViews();
};

function parseShopNumber(value) {
  if (value === null || value === undefined || value === '') return null;
  const n = parseFloat(String(value).replace(',', '.'));
  return Number.isFinite(n) ? n : null;
}

function getCheckoutSubtotal() {
  const cart = getCart();
  return cart.reduce((sum, item) => {
    const p = _catalog.find(x => x.id === item.id);
    if (!p) return sum;
    return sum + productDisplayUnitPrice(p) * Number(item.qty || 0);
  }, 0);
}

function getDeliveryFee() {
  if (selectedDeliveryMethod === 'pickup') return 0;

  const user = getCurrentUser();
  const personal = parseShopNumber(user?.deliveryFee);
  if (personal !== null) return personal;

  const settings = getSettings();
  const def = parseShopNumber(settings?.defaultDeliveryFee);
  return def !== null ? def : 0;
}

function cleanForFirestore(value) {
  if (Array.isArray(value)) return value.map(cleanForFirestore).filter(v => v !== undefined);
  if (value && typeof value === 'object') {
    const out = {};
    Object.entries(value).forEach(([k, v]) => {
      if (v !== undefined) out[k] = cleanForFirestore(v);
    });
    return out;
  }
  return value;
}


async function notifyNewOrderInWhatsApp(order) {

let submitOrderInProgress = false;

window.submitOrder = async () => {
  const name=document.getElementById('ch-name').value.trim();
  const phone=document.getElementById('ch-phone').value.trim();
  const contactPerson=document.getElementById('ch-contact-person')?.value.trim() || '';
  const contactPhone=document.getElementById('ch-contact-phone')?.value.trim() || '';
  const date=document.getElementById('ch-date').value;
  const address=document.getElementById('ch-addr').value.trim();
  const invoiceDetails=document.getElementById('ch-invoice-details')?.value.trim() || '';

  if(!name){showToast(t('fillName'));return;}
  if(!phone){showToast(t('fillPhone'));return;}
  if(!date){showToast(t('fillDate'));return;}
  if(selectedPay==='invoice' && !invoiceDetails){
    const invoiceEl=document.getElementById('ch-invoice-details');
    const invoiceMsg=document.getElementById('invoice-required-msg');
    if(invoiceMsg) invoiceMsg.style.display='block';
    if(invoiceEl) invoiceEl.focus();
    showToast('Añade los datos para factura');
    return;
  }

  const cart=getCart();
  if(!cart.length){showToast(t('cartEmpty'));return;}

  const items=cart.map(c=>{
    const p=_catalog.find(x=>x.id===c.id);
    if(!p) return null;
    return {
      id:String(c.id),
      name:productName(p),
      qty:Number(c.qty || 0),
      price:Number(productDisplayUnitPrice(p))
    };
  }).filter(Boolean);

  if(!items.length){showToast(t('cartEmpty'));return;}

  const subtotal=items.reduce((s,i)=>s+(i.price*i.qty),0);
  if (submitOrderInProgress) return;
  submitOrderInProgress = true;

  const user=getCurrentUser();
  const deliveryFee=getDeliveryFee();
  const total=subtotal+deliveryFee;

  const order=cleanForFirestore({
    date:new Date().toISOString(),
    customer:{
      name,
      phone,
      contactPerson,
      contactPhone,
      address,
      userId:user?.id||null,
      userName:user?.name||user?.login||null
    },
    delivery:{
      method:selectedDeliveryMethod,
      date,
      time:document.getElementById('ch-time').value || '',
      address:selectedDeliveryMethod==='delivery'?address:'',
      fee:deliveryFee,
      notes:selectedDeliveryMethod==='delivery'?(user?.deliveryNotes||''):''
    },
    subtotal,
    deliveryFee,
    payment:selectedPay,
    invoiceDetails:selectedPay==='invoice'?invoiceDetails:null,
    items,
    total,
    status:'new',
    lang:detectLang(),
  });

  try {
    showLoading('Sending order…');
    await fbAddOrder(order);
    notifyNewOrderInWhatsApp(order);

    if (user && !user.guest && user.id) {
      const clientUpdate = cleanForFirestore({
        id:user.id,
        phone,
        contactPerson,
        contactPhone,
        address,
        invoiceDetails,
        preferredPayment:selectedPay,
        deliveryMethod:selectedDeliveryMethod
      });

      try {
        await fbSaveClient(clientUpdate);
        if (typeof setCurrentUser === 'function') {
          setCurrentUser({...user, ...clientUpdate});
        }
      } catch(profileError) {
        console.warn('Client profile update error:', profileError);
      }
    }

    saveCart([]);
    hideLoading();
    const dFmt=new Date(date+'T00:00:00').toLocaleDateString(detectLang(),{day:'numeric',month:'long'});
    document.getElementById('success-msg').textContent=`${name} — ${formatPrice(total)}, ${dFmt}. ${t('orderSuccessMsg')}`;
    goPage('success');
    submitOrderInProgress = false;
  } catch(e) {
    submitOrderInProgress = false;
    console.error('Order save error:', e, order);
    hideLoading();
    showToast(`Error saving order: ${e?.message || e}`);
  }
};

  return (dict[lang] || dict.es)[key] || key;
}

function shopLocalDateISO(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function shopParseDateOnly(value) {
  if (!value) return null;
  const str = String(value);
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m - 1, d).getTime();
  }
  const parsed = new Date(str);
  if (Number.isNaN(parsed.getTime())) return null;
  return new Date(parsed.getFullYear(), parsed.getMonth(), parsed.getDate()).getTime();
}

function shopOrderReportDate(o) {
  return o.delivery?.date || o.date || '';
}

function myOrderMatchesPeriod(o) {
  const from = document.getElementById('my-date-from')?.value || '';
  const to = document.getElementById('my-date-to')?.value || '';
  if (!from && !to) return true;

  const ms = shopParseDateOnly(shopOrderReportDate(o));
  const fromMs = shopParseDateOnly(from);
  const toMs = shopParseDateOnly(to);

  if (ms === null) return false;
  if (fromMs !== null && ms < fromMs) return false;
  if (toMs !== null && ms > toMs) return false;
  return true;
}

window.setMyOrdersPeriod = preset => {
  const fromEl = document.getElementById('my-date-from');
  const toEl = document.getElementById('my-date-to');
  if (!fromEl || !toEl) return;

  const now = new Date();

  if (preset === 'reset') {
    fromEl.value = '';
    toEl.value = '';
  }

  if (preset === 'month') {
    fromEl.value = shopLocalDateISO(new Date(now.getFullYear(), now.getMonth(), 1));
    toEl.value = shopLocalDateISO(new Date(now.getFullYear(), now.getMonth() + 1, 0));
  }

  if (preset === 'last-month') {
    fromEl.value = shopLocalDateISO(new Date(now.getFullYear(), now.getMonth() - 1, 1));
    toEl.value = shopLocalDateISO(new Date(now.getFullYear(), now.getMonth(), 0));
  }

  renderMyOrders();
};

function myOrderProductsTotal(o) {
  const n = Number(o.subtotal);
  if (Number.isFinite(n)) return n;
  return (o.items || []).reduce((sum,i) => sum + Number(i.price || 0) * Number(i.qty || 0), 0);
}

function myOrderGrandTotal(o) {
  const n = Number(o.total);
  if (Number.isFinite(n)) return n;
  return myOrderProductsTotal(o) + Number(o.deliveryFee || o.delivery?.fee || 0);
}

function isClientReportProductItem(item, order) {
  const name = String(item?.name || '').toLowerCase();
  const payment = String(order?.payment || '').toLowerCase();
  if (!name) return false;
  if (name.startsWith('pedido sin cuenta')) return false;
  if (name.startsWith('public request')) return false;
  if (payment === 'public request') return false;
  return true;
}

function shortProductLabel(name) {
  return String(name || 'Product')
    .replace(/^empanadillas?\s+(dulces\s+)?de\s+brioche\s+con\s+/i, '')
    .replace(/^brioche\s+pirozhki\s+with\s+/i, '')
    .replace(/^пирожки\s+с\s+/i, '')
    .slice(0, 32);
}

function myMonthKey(value) {
  const ms = shopParseDateOnly(value);
  if (ms === null) return { key:'no-date', label:'No date', sort:0 };
  const d = new Date(ms);
  return {
    key: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,
    label: d.toLocaleDateString(detectLang(), { month:'short', year:'numeric' }),
    sort: new Date(d.getFullYear(), d.getMonth(), 1).getTime()
  };
}

function renderMyStatsCards(orders) {
  const el = document.getElementById('my-stats-cards');
  if (!el) return;

  const orderCount = orders.length;
  const productsQty = orders.reduce((sum,o) => sum + (o.items || []).reduce((s,i) => isClientReportProductItem(i,o) ? s + Number(i.qty || 0) : s, 0), 0);
  const productsTotal = orders.reduce((sum,o) => sum + myOrderProductsTotal(o), 0);
  const avg = orderCount ? myOrderGrandTotal(orders[0]) && orders.reduce((sum,o) => sum + myOrderGrandTotal(o), 0) / orderCount : 0;

  el.innerHTML = `
    <div class="stat-card"><div class="stat-num">${orderCount}</div><div class="stat-label">${myStatsText('orders')}</div></div>
    <div class="stat-card"><div class="stat-num">${productsQty}</div><div class="stat-label">${myStatsText('products')}</div></div>
    <div class="stat-card"><div class="stat-num">${formatPrice(productsTotal)}</div><div class="stat-label">${myStatsText('productsTotal')}</div></div>
    <div class="stat-card"><div class="stat-num">${formatPrice(avg)}</div><div class="stat-label">${myStatsText('avg')}</div></div>
  `;
}

function buildMyChartRows(orders, kind) {
  const map = new Map();

  if (kind === 'favorite_qty') {
    orders.forEach(o => {
      (o.items || []).forEach(i => {
        if (!isClientReportProductItem(i,o)) return;
        const label = shortProductLabel(i.name);
        map.set(label, (map.get(label) || 0) + Number(i.qty || 0));
      });
    });

    return [...map.entries()]
      .map(([label,value]) => ({ label, value }))
      .filter(r => r.value > 0)
      .sort((a,b) => b.value - a.value)
      .slice(0, 8);
  }

  orders.forEach(o => {
    const m = myMonthKey(shopOrderReportDate(o));
    const current = map.get(m.key) || { label:m.label, value:0, sort:m.sort };

    if (kind === 'spending_month') current.value += myOrderGrandTotal(o);
    if (kind === 'orders_month') current.value += 1;

    map.set(m.key, current);
  });

  return [...map.values()]
    .filter(r => r.value > 0)
    .sort((a,b) => a.sort - b.sort);
}

function myChartValueText(value, money) {
  return money ? formatPrice(value) : String(Math.round(value));
}

function renderMyStatsChart(orders) {
  const el = document.getElementById('my-stats-chart');
  const select = document.getElementById('my-stats-chart-data');
  if (!el || !select) return;

  const kind = select.value || 'favorite_qty';
  const rows = buildMyChartRows(orders, kind);
  const money = kind === 'spending_month';
  const isLine = kind !== 'favorite_qty';

  if (!rows.length) {
    el.innerHTML = `<div class="empty-state" style="padding:20px"><div class="eicon">📊</div><p>${myStatsText('noData')}</p></div>`;
    return;
  }

  const max = Math.max(...rows.map(r => r.value), 1);
  const w = 720;
  const h = 240;
  const padL = isLine ? 42 : 70;
  const padR = 80;
  const padT = 22;
  const padB = 38;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  if (isLine) {
    const denom = Math.max(rows.length - 1, 1);
    const points = rows.map((r,i) => {
      const x = padL + plotW * i / denom;
      const y = padT + plotH - plotH * r.value / max;
      return { ...r, x, y };
    });
    const path = points.map((p,i) => `${i ? 'L' : 'M'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');

    el.innerHTML = `
      <svg viewBox="0 0 ${w} ${h}" style="width:100%;min-width:520px;display:block;color:var(--brand)">
        <line x1="${padL}" y1="${padT + plotH}" x2="${padL + plotW}" y2="${padT + plotH}" stroke="currentColor" opacity=".25"/>
        <path d="${path}" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        ${points.map(p => `
          <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="currentColor">
            <title>${p.label} · ${myChartValueText(p.value, money)}</title>
          </circle>
          <text x="${p.x.toFixed(1)}" y="${h - 14}" text-anchor="middle" font-size="11" fill="var(--text2)">${p.label}</text>
        `).join('')}
      </svg>
    `;
    return;
  }

  el.innerHTML = `
    <div class="client-chart-bars">
      ${rows.map(r => {
        const value = myChartValueText(r.value, false);
        const width = Math.max(4, Math.round(100 * r.value / max));
        return `
          <div class="client-chart-row" title="${r.label} · ${value}">
            <div class="client-chart-label">${r.label}</div>
            <div class="client-chart-track">
              <div class="client-chart-fill" style="width:${width}%"></div>
            </div>
            <div class="client-chart-value">${value}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function updateMyOrdersLabels() {
  const pairs = [
    ['my-period-title','period'], ['my-date-from-label','from'], ['my-date-to-label','to'], ['my-apply-period','apply'],
    ['my-this-month','thisMonth'], ['my-last-month','lastMonth'], ['my-reset-period','reset'],
    ['my-chart-title','chart'], ['my-chart-note','chartNote'], ['my-history-title','history']
  ];
  pairs.forEach(([id,key]) => {
    const el = document.getElementById(id);
    if (el) el.textContent = myStatsText(key);
  });

  const sel = document.getElementById('my-stats-chart-data');
  if (sel) {
    sel.querySelector('[value="favorite_qty"]').textContent = myStatsText('favorite');
    sel.querySelector('[value="spending_month"]').textContent = myStatsText('spending');
    sel.querySelector('[value="orders_month"]').textContent = myStatsText('ordersByMonth');
  }
}


function shopEscape(v) {
  return String(v ?? '')
    .replace(/&/g,'&amp;')
    .replace(/"/g,'&quot;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function clientCanEditDelivery(o) {
  return o && !['done','cancelled'].includes(o.status);
}

function clientDeliveryDateValue(o) {
  return o?.delivery?.date || o?.deliveryDate || '';
}

function clientDeliveryTimeValue(o) {
  return o?.delivery?.time || '';
}

function decorateMyOrdersDeliveryEditors(list=[]) {
  const el = document.getElementById('my-orders-list');
  if (!el) return;

  Array.from(el.children).forEach((card, index) => {
    const o = list[index];
    if (!o || !clientCanEditDelivery(o)) return;
    if (card.querySelector('[data-client-delivery-editor]')) return;

    const wrap = document.createElement('div');
    wrap.setAttribute('data-client-delivery-editor', '1');
    wrap.className = 'info-box';
    wrap.style.cssText = 'margin:10px 0;font-size:13px;line-height:1.5';

    const date = clientDeliveryDateValue(o);
    const time = clientDeliveryTimeValue(o);

    wrap.innerHTML = `
      <b>📅 Change delivery date / time</b>
      <div style="display:grid;grid-template-columns:150px 1fr auto;gap:8px;margin-top:8px;align-items:center">
        <input type="date" id="client-delivery-date-${String(o.id)}" value="${shopEscape(date)}">
        <input type="text" id="client-delivery-time-${String(o.id)}" value="${shopEscape(time)}" placeholder="Time / window">
        <button type="button" class="btn btn-primary btn-sm" onclick="saveClientOrderDelivery('${String(o.id)}')">Save</button>
      </div>
      ${o.status === 'confirmed' ? '<div style="font-size:12px;color:var(--text3);margin-top:6px">Changing delivery date will require confirmation again.</div>' : ''}
    `;

    const body = card.querySelector('.order-body') || card;
    body.appendChild(wrap);
  });
}

window.saveClientOrderDelivery = async id => {
  const user = getCurrentUser();
  if (!user || user.guest) return;

  const order = (_orders || []).find(o => String(o.id) === String(id));
  if (!order) {
    showToast('Order not found');
    return;
  }

  if (!clientCanEditDelivery(order)) {
    showToast('This order cannot be edited');
    return;
  }

  const dateEl = document.getElementById('client-delivery-date-' + id);
  const timeEl = document.getElementById('client-delivery-time-' + id);

  const date = dateEl ? dateEl.value : '';
  const time = timeEl ? timeEl.value.trim() : '';

  if (!date) {
    showToast(t('fillDate'));
    if (dateEl) dateEl.focus();
    return;
  }

  const delivery = Object.assign({}, order.delivery || {}, { date, time });
  const patch = { delivery };

  if (order.status === 'confirmed') {
    patch.confirmationStatus = 'pending';
    patch.confirmationSentAt = '';
  }

  try {
    await fbUpdateOrder(id, patch);

    order.delivery = delivery;
    if (patch.confirmationStatus !== undefined) {
      order.confirmationStatus = patch.confirmationStatus;
      order.confirmationSentAt = patch.confirmationSentAt;
    }

    showToast(order.status === 'confirmed'
      ? 'Delivery updated. Awaiting confirmation.'
      : 'Delivery updated ✓'
    );

    renderMyOrders();
  } catch(e) {
    console.error('Client delivery update error:', e);
    showToast('Error saving delivery');
  }
};



function repeatOrderLabel() {
  const lang = detectLang();
  return ({ es:'Repetir pedido', ru:'Повторить заказ', en:'Repeat order' }[lang]) || 'Repeat order';
}

window.repeatOrder = id => {
  const order = (_orders || []).find(o => String(o.id) === String(id));
  if (!order) {
    showToast('Order not found');
    return;
  }

  const nextCart = [];
  let skipped = 0;

  (order.items || []).forEach(item => {
    const productId = String(item.id || '');
    const p = _catalog.find(x => String(x.id) === productId);

    if (!p || p.available === false) {
      skipped++;
      return;
    }

    const qty = Number(item.qty || 0);
    if (!Number.isFinite(qty) || qty <= 0) {
      skipped++;
      return;
    }

    nextCart.push({ id: productId, qty });
  });

  if (!nextCart.length) {
    showToast('No available products to repeat');
    return;
  }

  saveCart(nextCart);
  syncCartViews({ cart:true });
  goPage('cart');

  showToast(skipped
    ? `${repeatOrderLabel()}: ${nextCart.length} items, ${skipped} skipped`
    : repeatOrderLabel() + ' ✓'
  );
};



function clientCanDeleteOrder(o) {
  return o && o.status === 'new';
}

function clientDeleteOrderLabel() {
  const lang = detectLang();
  return ({ es:'Eliminar pedido', ru:'Удалить заказ', en:'Delete order' }[lang]) || 'Delete order';
}

function clientDeleteOrderConfirmText() {
  const lang = detectLang();
  return ({
    es:'¿Eliminar este pedido? El equipo lo verá como cancelado.',
    ru:'Удалить этот заказ? Для админа он будет отмечен как отменённый.',
    en:'Delete this order? The team will see it as cancelled.'
  }[lang]) || 'Delete this order?';
}

function clientDeleteOrderDoneText() {
  const lang = detectLang();
  return ({ es:'Pedido cancelado', ru:'Заказ отменён', en:'Order cancelled' }[lang]) || 'Order cancelled';
}

window.deleteClientOrder = async id => {
  const user = getCurrentUser();
  if (!user || user.guest) return;

  const order = (_orders || []).find(o => String(o.id) === String(id));
  if (!order || String(order.customer?.userId || '') !== String(user.id || '')) {
    showToast('Order not found');
    return;
  }

  if (!clientCanDeleteOrder(order)) {
    showToast(clientDeleteOrderDoneText());
    return;
  }

  if (!confirm(clientDeleteOrderConfirmText())) return;

  const patch = {
    status: 'cancelled',
    cancelledAt: new Date().toISOString(),
    cancelledBy: 'client',
    confirmationStatus: '',
    confirmationSentAt: ''
  };

  try {
    await fbUpdateOrder(id, patch);
    Object.assign(order, patch);
    showToast(clientDeleteOrderDoneText());
    renderMyOrders();
  } catch(e) {
    console.error('Client delete order error:', e);
    showToast('Error deleting order');
  }
};


window.renderMyOrders = async () => {
  const user=getCurrentUser();
  updateMyOrdersLabels();

  showLoading('Loading orders…');
  try { _orders=await fbGetOrders(); } catch(e){}
  hideLoading();

  const allMine=user&&!user.guest?_orders.filter(o=>o.customer?.userId===user.id):_orders;
  const mine=allMine.filter(myOrderMatchesPeriod);

  renderMyStatsCards(mine);
  renderMyStatsChart(mine);

  const el=document.getElementById('my-orders-list');
  const SC={new:'badge-new',confirmed:'badge-confirmed',done:'badge-done',cancelled:'badge-cancelled'};
  const SL={new:t('statusNew'),confirmed:t('statusConfirmed'),done:t('statusDone'),cancelled:t('statusCancelled')};

  if(!mine.length){
    el.innerHTML=`<div class="empty-state"><div class="eicon">📋</div><p>${t('noOrders')}</p></div>`;
    return;
  }

  el.innerHTML=mine.map(o=>{
    const d=new Date(o.date).toLocaleDateString(detectLang(),{day:'numeric',month:'short',year:'numeric'});
    const delD=o.delivery?.date?new Date(o.delivery.date).toLocaleDateString(detectLang(),{day:'numeric',month:'long'}):'';
    return`<div class="order-card">
      <div class="order-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <div>
          <div style="font-size:12px;color:var(--text3);font-weight:700">#${String(o.id).slice(-6)} · ${d}</div>
          <div style="font-size:16px;font-weight:700;margin-top:2px">${formatPrice(myOrderGrandTotal(o))}</div>
          ${delD?`<div style="font-size:13px;color:var(--text2);margin-top:2px">📅 ${delD}</div>`:''}
        </div>
        <span class="badge ${SC[o.status]||'badge-new'}">${SL[o.status]||o.status}</span>
      </div>
      <div class="order-body">
        <ul style="font-size:14px;color:var(--text2);margin-bottom:8px;list-style:none;padding:0">
          ${(o.items||[]).map(i=>`<li>• ${i.name} × ${i.qty} = ${formatPrice(i.price*i.qty)}</li>`).join('')}
        </ul>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
          <button type="button" class="btn btn-primary btn-sm" onclick="repeatOrder('${o.id}')">${repeatOrderLabel()}</button>
          ${clientCanDeleteOrder(o)?`<button type="button" class="btn btn-danger btn-sm" onclick="deleteClientOrder('${o.id}')">${clientDeleteOrderLabel()}</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
  decorateMyOrdersDeliveryEditors(mine);
};

window.newOrder = () => { goPage('catalog'); renderCatalog(); };
window.doLogout = () => { clearCurrentUser(); window.location.href='login.html'; };
window.toggleLangMenu = () => { const m=document.getElementById('lang-menu');m.style.display=m.style.display==='none'?'block':'none'; };
document.addEventListener('click',e=>{if(!e.target.closest('#lang-toggle')&&!e.target.closest('#lang-menu'))document.getElementById('lang-menu').style.display='none';});

window.goPage = name => {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.bottom-nav a').forEach(a=>a.classList.remove('active'));
  const map={catalog:'nav-catalog',cart:'nav-cart',orders:'nav-orders'};
  if(map[name])document.getElementById(map[name])?.classList.add('active');
  window.scrollTo(0,0);
};

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
boot();
</script>
</body>
